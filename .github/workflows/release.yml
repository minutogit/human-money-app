name: Release Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            # Linux Artifacts landen im Standard-Release-Ordner
            bundle_path: "src-tauri/target/release/bundle"
            exts: "deb,AppImage"

          - platform: macos-latest
            # Baut ein Universal Binary (Intel + Apple Silicon) für maximale Kompatibilität
            args: "-- --target universal-apple-darwin"
            # Universal Builds liegen in einem speziellen Unterordner
            bundle_path: "src-tauri/target/universal-apple-darwin/release/bundle"
            exts: "dmg"

          - platform: windows-latest
            args: ""
            bundle_path: "src-tauri/target/release/bundle"
            exts: "exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS braucht beide Targets für das Universal Binary
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        # Hier sind die korrekten Pakete für Tauri v2 (webkit2gtk-4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build Application
        env:
          # Setzt minimale macOS Version auf Catalina (10.15) für gute Rückwärtskompatibilität
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        # Führt 'npm run tauri build' mit den Argumenten aus der Matrix aus
        run: npm run tauri build ${{ matrix.args }}

      - name: Collect Artifacts
        id: collect_artifacts
        shell: bash
        run: |
          # Findet und listet die Dateien basierend auf der Matrix-Extension
          FILES=""
          IFS=',' read -ra EXT_ARRAY <<< "${{ matrix.exts }}"
          for ext in "${EXT_ARRAY[@]}"; do 
             # 'find' nutzen, um die Dateien im korrekten Pfad sicher zu finden
             FOUND=$(find "${{ matrix.bundle_path }}" -name "*.$ext" -type f)
             FILES="$FILES $FOUND"
          done
          echo "Found artifacts: $FILES"
          
          # Ausgabe für den Upload-Schritt vorbereiten (GitHub Actions Multiline Format)
          echo "artifacts<<EOF" >> $GITHUB_OUTPUT
          echo $FILES | tr ' ' '\n' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload Artifacts to Workflow Run
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-bundles
          path: ${{ steps.collect_artifacts.outputs.artifacts }}
          if-no-files-found: error

      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: ${{ steps.collect_artifacts.outputs.artifacts }}
