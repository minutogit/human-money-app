name: Release Tauri App

on:
  push:
    branches:
      - action-workflow
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
            bundle_path: "src-tauri/target/release/bundle"
            exts: "deb,AppImage"

          - platform: macos-latest
            args: "-- --target universal-apple-darwin"
            bundle_path: "src-tauri/target/universal-apple-darwin/release/bundle"
            exts: "dmg"

          - platform: windows-latest
            args: ""
            bundle_path: "src-tauri/target/release/bundle"
            exts: "exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Sync Rust dependencies
        run: |
          cd src-tauri
          cargo update

      # NEU: Version auslesen
      - name: Get Version
        id: get_version
        shell: bash
        run: |
          # Liest die Version aus Cargo.toml (Zeile die mit version = "..." beginnt)
          VERSION=$(grep "^version" src-tauri/Cargo.toml | head -n 1 | cut -d '"' -f 2)
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Gefundene Version: $VERSION"

      - name: Build Application
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: npm run tauri build ${{ matrix.args }}

      - name: Collect Artifacts
        id: collect_artifacts
        shell: bash
        run: |
          FILES=""
          IFS=',' read -ra EXT_ARRAY <<< "${{ matrix.exts }}"
          for ext in "${EXT_ARRAY[@]}"; do 
             FOUND=$(find "${{ matrix.bundle_path }}" -name "*.$ext" -type f)
             FILES="$FILES $FOUND"
          done
          echo "Found artifacts: $FILES"
          echo "artifacts<<EOF" >> $GITHUB_OUTPUT
          echo $FILES | tr ' ' '\n' >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # GEÄNDERT: Release Logic
      - name: Create Release
        uses: softprops/action-gh-release@v2
        # Läuft jetzt bei Tags ODER beim spezifischen Branch
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/action-workflow'
        with:
          # Wenn es ein Tag ist, nimm den Tag-Namen. Wenn Branch, nimm 'nightly'
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          # Name des Releases (z.B. "v0.1.0" oder "Nightly Build v0.1.0")
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('Nightly Build v{0}', env.APP_VERSION) }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }} # Branch-Builds sind Pre-Releases
          files: ${{ steps.collect_artifacts.outputs.artifacts }}